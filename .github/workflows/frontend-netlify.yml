name: Deploy Frontend (Netlify)

on:
  push:
    branches: ["master", "main"]
  workflow_dispatch:

concurrency:
  group: deploy-frontend-netlify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-backend:
    name: New CBOM logic tests pass
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scoring and CBOM regression tests
        run: |
          python -m unittest tests.test_offline_and_scoring -q

  deploy-frontend-netlify:
    name: Deploy Frontend (Netlify)
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate Netlify secrets
        run: |
          if [ -z "${{ secrets.NETLIFY_AUTH_TOKEN }}" ]; then
            echo "Missing NETLIFY_AUTH_TOKEN in repository secrets."
            exit 1
          fi
          if [ -z "${{ secrets.NETLIFY_SITE_ID }}" ]; then
            echo "Missing NETLIFY_SITE_ID in repository secrets."
            exit 1
          fi
          if [ -z "${{ secrets.NETLIFY_SITE_URL }}" ]; then
            echo "Missing NETLIFY_SITE_URL in repository secrets."
            exit 1
          fi

      - name: Install Netlify CLI
        run: npm install --global netlify-cli@latest

      - name: Deploy frontend to Netlify production
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          netlify deploy --prod --dir frontend --message "GitHub Actions production deploy"

      - name: Probe custom domain readiness
        env:
          FRONTEND_URL: ${{ secrets.NETLIFY_SITE_URL }}
        run: |
          set -e
          for i in $(seq 1 20); do
            home_code="$(curl -sk -o /dev/null -w '%{http_code}' "$FRONTEND_URL" || true)"
            api_code="$(curl -sk -o /dev/null -w '%{http_code}' "$FRONTEND_URL/api/scans" || true)"
            if [ "$home_code" = "200" ] && [ "$api_code" = "200" ]; then
              echo "Readiness passed on $FRONTEND_URL (home=$home_code api=$api_code)."
              exit 0
            fi
            echo "Readiness attempt $i failed (home=$home_code api=$api_code). Retrying..."
            sleep 8
          done
          echo "Readiness failed for $FRONTEND_URL."
          exit 1
