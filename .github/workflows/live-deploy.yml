name: Live Deploy

on:
  push:
    branches: ["master", "main"]
    paths:
      - "frontend/**"
      - "backend/**"
      - "requirements.txt"
      - "netlify.toml"
      - "Dockerfile"
      - ".github/workflows/live-deploy.yml"
  workflow_dispatch:

jobs:
  test-backend:
    name: New CBOM logic tests pass
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scoring and CBOM regression tests
        run: |
          python -m unittest tests.test_offline_and_scoring -q

  deploy-frontend-netlify:
    name: Deploy Frontend (Netlify)
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Netlify target (temporary debug)
        run: |
          if [ -n "${{ secrets.NETLIFY_SITE_ID }}" ]; then
            site_hash="$(printf '%s' "${{ secrets.NETLIFY_SITE_ID }}" | sha256sum | cut -c1-10)"
            echo "Netlify site id hash prefix: ${site_hash}"
          else
            echo "Netlify site id hash prefix: missing"
          fi
          echo "Netlify publish dir: frontend"

      - name: Deploy to Netlify (Production)
        uses: netlify/actions/cli@master
        with:
          args: deploy --prod --dir frontend
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          API_ORIGIN: ${{ secrets.API_ORIGIN }}

  deploy-backend-azure:
    name: Deploy Backend (Azure Web App)
    runs-on: ubuntu-latest
    needs:
      - test-backend
      - deploy-frontend-netlify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Azure deployment secrets
        run: |
          if [ -z "${{ secrets.AZURE_WEBAPP_NAME }}" ]; then
            echo "Missing AZURE_WEBAPP_NAME in repository secrets."
            exit 1
          fi
          if [ -z "${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}" ] && [ -z "${{ secrets.AZURE_CREDENTIALS }}" ]; then
            echo "Missing Azure credentials. Set AZURE_WEBAPP_PUBLISH_PROFILE or AZURE_CREDENTIALS in repository secrets."
            exit 1
          fi

      - name: Show selected Azure auth path
        run: |
          echo "Azure app name: ${{ secrets.AZURE_WEBAPP_NAME }}"
          if [ -n "${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}" ]; then
            echo "Auth mode: publish-profile"
          elif [ -n "${{ secrets.AZURE_CREDENTIALS }}" ]; then
            echo "Auth mode: azure-login"
          else
            echo "Auth mode: none"
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Azure login (Service Principal)
        if: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE == '' && secrets.AZURE_CREDENTIALS != '' }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App (Publish Profile)
        if: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE != '' }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .

      - name: Deploy to Azure Web App (Azure Login)
        if: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE == '' && secrets.AZURE_CREDENTIALS != '' }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          package: .
