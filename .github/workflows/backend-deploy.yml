name: Deploy Backend

on:
  push:
    branches: ["master", "main"]
    paths:
      - "backend/**"
      - "requirements.txt"
      - "Dockerfile"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

jobs:
  test-backend:
    name: New CBOM logic tests pass
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scoring and CBOM regression tests
        run: |
          python -m unittest tests.test_offline_and_scoring -q

  deploy-backend:
    name: Deploy Backend (Hook)
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - name: Validate backend deployment secrets
        run: |
          if [ -z "${{ secrets.BACKEND_DEPLOY_HOOK_URL }}" ]; then
            echo "Missing BACKEND_DEPLOY_HOOK_URL in repository secrets."
            exit 1
          fi
          if [ -z "${{ secrets.BACKEND_ORIGIN }}" ]; then
            echo "Missing BACKEND_ORIGIN in repository secrets."
            exit 1
          fi

      - name: Trigger backend deployment
        run: |
          curl -fsSL -X POST "${{ secrets.BACKEND_DEPLOY_HOOK_URL }}"

      - name: Probe backend health
        run: |
          for i in $(seq 1 15); do
            code="$(curl -sk -o /dev/null -w '%{http_code}' "${{ secrets.BACKEND_ORIGIN }}/api/scans" || true)"
            if [ "$code" = "200" ]; then
              echo "Backend health check passed."
              exit 0
            fi
            echo "Health probe attempt $i failed (HTTP $code), retrying..."
            sleep 8
          done
          echo "Backend health check failed after retries."
          exit 1
