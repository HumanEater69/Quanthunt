name: Deploy Backend

on:
  push:
    branches: ["master", "main"]
    paths:
      - "backend/**"
      - "requirements.txt"
      - "Dockerfile"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

jobs:
  test-backend:
    name: New CBOM logic tests pass
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scoring and CBOM regression tests
        run: |
          python -m unittest tests.test_offline_and_scoring -q

  deploy-backend:
    name: Deploy Backend (Railway or Hook)
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - name: Validate backend deployment mode
        id: deploy_mode
        run: |
          origin="${{ secrets.BACKEND_ORIGIN }}"
          hook="${{ secrets.BACKEND_DEPLOY_HOOK_URL }}"
          if [ -z "$origin" ]; then
            echo "Missing BACKEND_ORIGIN in repository secrets."
            exit 1
          fi
          if echo "$origin" | grep -qi "railway\.app"; then
            echo "railway_native=true" >> "$GITHUB_OUTPUT"
            if [ -z "${{ secrets.RAILWAY_TOKEN }}" ] || [ -z "${{ secrets.RAILWAY_PROJECT_ID }}" ] || [ -z "${{ secrets.RAILWAY_ENVIRONMENT_ID }}" ] || [ -z "${{ secrets.RAILWAY_SERVICE_ID }}" ]; then
              echo "Missing Railway secrets (RAILWAY_TOKEN, RAILWAY_PROJECT_ID, RAILWAY_ENVIRONMENT_ID, RAILWAY_SERVICE_ID) for Railway-native origin: $origin"
              exit 1
            fi
          else
            echo "railway_native=false" >> "$GITHUB_OUTPUT"
            if [ -z "$hook" ]; then
              echo "No BACKEND_DEPLOY_HOOK_URL set for non-Railway backend. Continuing without hook trigger."
            fi
          fi

      - name: Install Railway CLI
        if: ${{ steps.deploy_mode.outputs.railway_native == 'true' }}
        run: npm install --global @railway/cli@latest

      - name: Trigger backend deployment (Railway native)
        if: ${{ steps.deploy_mode.outputs.railway_native == 'true' }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway link --project "${{ secrets.RAILWAY_PROJECT_ID }}" --environment "${{ secrets.RAILWAY_ENVIRONMENT_ID }}" --service "${{ secrets.RAILWAY_SERVICE_ID }}"
          railway redeploy --service "${{ secrets.RAILWAY_SERVICE_ID }}" --yes

      - name: Trigger backend deployment (generic hook)
        if: ${{ steps.deploy_mode.outputs.railway_native != 'true' }}
        run: |
          if [ -z "${{ secrets.BACKEND_DEPLOY_HOOK_URL }}" ]; then
            echo "Skipped hook trigger because BACKEND_DEPLOY_HOOK_URL is not configured."
            exit 0
          fi
          code="$(curl -sk -o /dev/null -w '%{http_code}' -X POST "${{ secrets.BACKEND_DEPLOY_HOOK_URL }}" || true)"
          if [ "$code" = "200" ] || [ "$code" = "201" ] || [ "$code" = "202" ]; then
            echo "Backend deploy hook accepted (HTTP $code)."
          else
            echo "Backend deploy hook did not return success (HTTP $code). Continuing to health probe."
          fi

      - name: Probe backend health
        run: |
          for i in $(seq 1 15); do
            code="$(curl -sk -o /dev/null -w '%{http_code}' "${{ secrets.BACKEND_ORIGIN }}/api/scans" || true)"
            if [ "$code" = "200" ]; then
              echo "Backend health check passed."
              exit 0
            fi
            echo "Health probe attempt $i failed (HTTP $code), retrying..."
            sleep 8
          done
          echo "Backend health check failed after retries."
          exit 1

      - name: Smoke check certification-status route
        run: |
          spec="$(curl -fsSL "${{ secrets.BACKEND_ORIGIN }}/openapi.json" || true)"
          if [ -z "$spec" ]; then
            spec="$(curl -fsSL "${{ secrets.BACKEND_ORIGIN }}/api/openapi.json" || true)"
          fi
          if [ -z "$spec" ]; then
            echo "Could not retrieve OpenAPI spec from backend origin."
            exit 1
          fi
          if ! echo "$spec" | grep -q '"/api/scan/{scan_id}/certification-status"'; then
            echo "Missing required route: /api/scan/{scan_id}/certification-status"
            exit 1
          fi
          echo "Certification-status route present in OpenAPI spec."
